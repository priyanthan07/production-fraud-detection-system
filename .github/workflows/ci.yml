name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install ruff

      - name: Run ruff linter
        run: |
          ruff check src/ tests/ --output-format github

      - name: Run ruff formatter check
        run: |
          ruff format src/ tests/ --check

  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: |
          pip install uv

      - name: Install project dependencies
        run: |
          uv pip install --system -e "." || pip install -e "."
          uv pip install --system pytest httpx || pip install pytest httpx

      - name: Run unit tests
        run: |
          pytest tests/unit/ -v --tb=short

      - name: Run integration tests
        run: |
          pytest tests/integration/ -v --tb=short

  build:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build inference image
        run: |
          docker build \
            -f docker/inference.Dockerfile \
            -t fraud-inference:${{ github.sha }} \
            -t fraud-inference:latest \
            .

      - name: Build MLflow image
        run: |
          docker build \
            -f docker/mlflow.Dockerfile \
            -t fraud-mlflow:${{ github.sha }} \
            -t fraud-mlflow:latest \
            .

      - name: Build Airflow image
        run: |
          docker build \
            -f docker/airflow.Dockerfile \
            -t fraud-airflow:${{ github.sha }} \
            -t fraud-airflow:latest \
            .

      - name: Verify images built
        run: |
          docker images | grep fraud
