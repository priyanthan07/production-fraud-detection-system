services:
  # ==========================================================
  # PostgreSQL — shared database
  # ==========================================================
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: mlflow_tracking
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Create Airflow database on first startup
      - ./docker/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    # appendonly yes — write every command to AOF log on disk
    # Redis reconstructs in-memory state from AOF on restart
    # Data survives docker compose down / restart
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ==========================================================
  # MLflow Tracking Server
  # ==========================================================
  mlflow:
    build:
      context: .
      dockerfile: docker/mlflow/Dockerfile
    ports:
      - "5000:5000"
    volumes:
      - mlflow_artifacts:/mlflow/artifacts
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      MLFLOW_TRACKING_URI: "postgresql://postgres:admin@postgres:5432/mlflow_tracking"
    restart: unless-stopped

  # ==========================================================
  # Inference Server (FastAPI)
  # ==========================================================
  inference:
    build:
      context: .
      dockerfile: docker/inference/Dockerfile
    ports:
      - "8000:8000"
    volumes:
      # Mount artifacts so inference can load models
      - mlflow_artifacts:/mlflow/artifacts
      # Mount processed data for encodings and feature columns
      - ./data/processed:/app/data/processed:ro
      - ./data/production:/app/data/production
    depends_on:
      postgres:
        condition: service_healthy
      mlflow:
        condition: service_started
      redis:
        condition: service_healthy
    environment:
      MLFLOW_TRACKING_URI: "postgresql://postgres:admin@postgres:5432/mlflow_tracking"
      REDIS_HOST: "redis"
      REDIS_PORT: "6379"
    restart: unless-stopped

  # ==========================================================
  # Prometheus — metrics collection
  # ==========================================================
  prometheus:
    image: prom/prometheus:v2.53.0
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    depends_on:
      - inference
    restart: unless-stopped

  # ==========================================================
  # Grafana — monitoring dashboards
  # ==========================================================
  grafana:
    image: grafana/grafana:11.1.0
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
    restart: unless-stopped

  # ==========================================================
  # Airflow — one-time DB initialization
  # ==========================================================
  airflow-init:
    build:
      context: .
      dockerfile: docker/airflow/Dockerfile
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db migrate &&
        airflow users create \
          --username admin \
          --password admin \
          --firstname Admin \
          --lastname User \
          --role Admin \
          --email admin@example.com || true
    environment:
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: "postgresql+psycopg2://postgres:admin@postgres:5432/airflow"
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    depends_on:
      postgres:
        condition: service_healthy

  # ==========================================================
  # Airflow Webserver
  # ==========================================================
  airflow-webserver:
    build:
      context: .
      dockerfile: docker/airflow/Dockerfile
    command: airflow webserver --port 8080
    ports:
      - "8080:8080"
    environment:
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: "postgresql+psycopg2://postgres:admin@postgres:5432/airflow"
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__WEBSERVER__EXPOSE_CONFIG: "true"
      MLFLOW_TRACKING_URI: "postgresql://postgres:admin@postgres:5432/mlflow_tracking"
    volumes:
      - ./airflow/dags:/opt/airflow/dags:ro
      - ./data:/opt/airflow/project/data
    depends_on:
      airflow-init:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
    restart: unless-stopped

  # ==========================================================
  # Airflow Scheduler
  # ==========================================================
  airflow-scheduler:
    build:
      context: .
      dockerfile: docker/airflow/Dockerfile
    command: airflow scheduler
    environment:
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: "postgresql+psycopg2://postgres:admin@postgres:5432/airflow"
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      MLFLOW_TRACKING_URI: "postgresql://postgres:admin@postgres:5432/mlflow_tracking"
    volumes:
      - ./airflow/dags:/opt/airflow/dags:ro
      - ./data:/opt/airflow/project/data
    depends_on:
      airflow-init:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
    restart: unless-stopped

# ==========================================================
# Named volumes — persist data across container restarts
# ==========================================================
volumes:
  postgres_data:
  mlflow_artifacts:
  prometheus_data:
  grafana_data:
  redis_data:
  